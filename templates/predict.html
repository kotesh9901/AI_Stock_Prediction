<!DOCTYPE html>
<html>

<head>
    <title>AI Stock Prediction</title>
</head>

<body>

    <h1>📈 AI Stock Prediction</h1>

    <form action="/predict" method="POST">

        <label>Enter Stock Symbol</label>

        <br><br>

       <input
type="text"
name="stock"
class="form-control"
list="stocks"
placeholder="Example: TCS.NS"
required>

<datalist id="stocks">

<option value="TCS.NS">
<option value="INFY.NS">
<option value="RELIANCE.NS">
<option value="HDFCBANK.NS">
<option value="ICICIBANK.NS">
<option value="SBIN.NS">
<option value="WIPRO.NS">
<option value="TECHM.NS">
<option value="TATAMOTORS.NS">

</datalist>
        <br><br>

        <button type="submit">

            Predict

        </button>

    </form>

</body>

</html>
