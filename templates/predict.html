<!DOCTYPE html>
<html>

<head>
    <title>AI Stock Prediction</title>
</head>

<body>

    <h1>📈 AI Stock Prediction</h1>

    <form action="/predict" method="POST">

        <label>Enter Stock Symbol</label>

        <br><br>

        <input
            type="text"
            name="stock"
            placeholder="Example: TCS.NS"
            required>

        <br><br>

        <button type="submit">

            Predict

        </button>

    </form>

</body>

</html>
