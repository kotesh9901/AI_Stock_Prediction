<!DOCTYPE html>
<html>
<head>
    <title>Prediction History</title>
</head>

<body>

<h1>Prediction History</h1>

<table border="1" cellpadding="10">

<tr>
    <th>Stock</th>
    <th>Predicted Price</th>
    <th>Date</th>
</tr>

{% for row in history %}

<tr>
    <td>{{ row[0] }}</td>
    <td>₹{{ "%.2f"|format(row[1]) }}</td>
    <td>{{ row[2] }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
