<!DOCTYPE html>
<html>

<head>
    <title>Result</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-center">🤖 AI Prediction Result</h2>

<hr>

<h4>Stock: {{ stock }}</h4>
<h4>Current Price: ₹{{ current_price }}</h4>
<h4>Predicted Price: ₹{{ prediction }}</h4>
<h4>Difference: ₹{{ difference }}</h4>
<h4>{{ trend }}</h4>

<br>

<canvas id="chart"></canvas>

</div>

</div>

<script>

const labels = JSON.parse('{{ labels | tojson | safe }}');
const prices = JSON.parse('{{ prices | tojson | safe }}');

const ctx = document.getElementById("chart");

new Chart(ctx, {
    type: "line",

    data: {
        labels: labels,

        datasets: [{
            label: "Last 30 Days Price",
            data: prices,
            borderWidth: 2,
            tension: 0.3
        }]
    },

    options: {
        responsive: true
    }
});

</script>

</body>
</html>
